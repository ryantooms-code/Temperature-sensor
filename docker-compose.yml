version: "3.9"

services:
  sensehat-monitor:
    build: .
    container_name: sensehat_monitor
    restart: unless-stopped

    # Forward Flask API port to the host
    ports:
      - "5002:5002"

    # Mount the host DB directory so data persists across container restarts
    volumes:
      - /home/toomsey/assignement:/home/toomsey/assignement

    # Give the container access to the SenseHat hardware (Raspberry Pi only)
    # These lines have no effect on non-Pi hosts and can be left in safely.
    devices:
      - /dev/i2c-1:/dev/i2c-1
      - /dev/fb0:/dev/fb0
      - /dev/fb1:/dev/fb1
    privileged: true

    # Load environment variables from .env
    env_file:
      - .env

    # Override or add individual env vars here if needed
    environment:
      - DB_PATH=/home/toomsey/assignement/sense_data.db
      - POLL_INTERVAL=30
      - BLYNK_AUTH_TOKEN=pSbVAjTPl9HX_ObS3Pe3WzlsBaN5TK1O
